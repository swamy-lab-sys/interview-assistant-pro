<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Interview Assistant Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .error {
            background: #fee;
            color: #c00;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .success {
            background: #efe;
            color: #060;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .api-key {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            word-break: break-all;
            margin-top: 10px;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        <p class="subtitle">Start your free trial today</p>

        <div class="error" id="error"></div>
        <div class="success" id="success">
            <strong>Account created!</strong>
            <p>Your API key:</p>
            <div class="api-key" id="apiKey"></div>
            <p style="margin-top: 15px; font-size: 14px;">Save this key! You'll need it to use the assistant.</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="At least 8 characters" minlength="8">
            </div>
            <button type="submit" id="submitBtn">Create Free Account</button>
        </form>

        <div class="links">
            <p>Already have an account? <a href="/login">Sign in</a></p>
            <p style="margin-top: 10px;"><a href="/">Back to home</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const error = document.getElementById('error');
            const success = document.getElementById('success');

            btn.disabled = true;
            btn.textContent = 'Creating account...';
            error.style.display = 'none';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        full_name: document.getElementById('name').value || null
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('registerForm').style.display = 'none';
                    document.getElementById('apiKey').textContent = data.user.api_key;
                    success.style.display = 'block';

                    // Store token
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('apiKey', data.user.api_key);
                } else {
                    error.textContent = data.detail || 'Registration failed';
                    error.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Create Free Account';
                }
            } catch (err) {
                error.textContent = 'Network error. Please try again.';
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create Free Account';
            }
        });
    </script>
</body>
</html>
