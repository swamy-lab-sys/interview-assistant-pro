<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      width: 300px;
      padding: 15px;
      background: #1a1b1e;
      color: #fff;
    }

    h2 {
      font-size: 16px;
      margin: 0 0 15px 0;
      color: #4dabf7;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .status {
      font-size: 12px;
      color: #888;
      margin-bottom: 15px;
    }

    .shortcut {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .key {
      background: #333;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      color: #e9ecef;
    }

    .desc {
      color: #adb5bd;
    }

    .btn-group {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-direction: column;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    .btn-start {
      background: #40c057;
      color: #fff;
    }

    .btn-pause {
      background: #fab005;
      color: #fff;
    }

    .btn-stop {
      background: #fa5252;
      color: #fff;
    }

    .btn-toggle {
      background: #228be6;
      color: #fff;
    }
  </style>
</head>

<body>
  <h2>Interview Assistant</h2>

  <div class="status">
    Status: <span id="connection-status" style="color: #40c057">● Active</span>
  </div>

  <div class="shortcut">
    <span class="desc">Solve / Resume</span>
    <span class="key">Ctrl+Alt+A</span>
  </div>
  <div class="shortcut">
    <span class="desc">Pause Typing</span>
    <span class="key">Ctrl+Alt+P</span>
  </div>
  <div class="shortcut">
    <span class="desc">Stop / Reset</span>
    <span class="key">Ctrl+Alt+S</span>
  </div>

  <div class="shortcut" style="margin-top: 15px; border-top: 1px solid #333; padding-top: 15px;">
    <span class="desc">Typing Speed</span>
    <div style="display: flex; align-items: center; gap: 8px;">
      <input type="range" id="wpmSlider" min="10" max="30" value="20"
        style="width: 80px; accent-color: #4dabf7; cursor: pointer;">
      <span id="wpmValue" style="font-weight: 600; min-width: 35px;">20 WPM</span>
    </div>
  </div>

  <div class="btn-group">
    <button class="btn-start" id="btn-start">⚡ SOLVE NOW</button>
    <button class="btn-pause" id="btn-pause">⏸ PAUSE</button>
    <button class="btn-stop" id="btn-stop">⛔ STOP</button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
