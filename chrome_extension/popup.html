<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            -webkit-app-region: drag;
            /* Drag whole window */
        }

        .header {
            height: 40px;
            background: #f1f5f9;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 10px;
            border-bottom: 1px solid #cbd5e1;
        }

        .btn {
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            -webkit-app-region: no-drag;
            margin-left: 8px;
            font-weight: 600;
        }

        .btn-mobile {
            background: #3b82f6;
            color: white;
        }

        .btn-mobile:hover {
            background: #2563eb;
        }

        .btn-close {
            background: #ef4444;
            color: white;
        }

        .btn-close:hover {
            background: #dc2626;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            -webkit-app-region: no-drag;
        }

        /* QR Overlay */
        .qr-overlay {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            height: calc(100% - 40px);
            background: white;
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            -webkit-app-region: no-drag;
        }

        .qr-overlay h3 {
            margin: 0 0 10px 0;
            color: #0f172a;
        }

        .qr-overlay p {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 20px;
        }

        .qr-overlay img {
            border: 1px solid #e2e8f0;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="header">
        <button id="btnMobile" class="btn btn-mobile">📱 Use Phone (Hidden)</button>
        <button id="btnClose" class="btn btn-close">Close</button>
    </div>

    <div id="qrOverlay" class="qr-overlay">
        <h3>Stealth Mode</h3>
        <p>Scan to view answers on phone.<br>Desktop screen stays clean.</p>
        <img id="qrImage" src="" alt="Scan Me">
        <p id="qrUrl" style="font-size: 10px; color: #999; margin-top: 5px;">Loading...</p>
        <br>
        <button id="btnBack" class="btn btn-mobile">Back to Desktop</button>
    </div>

    <iframe src="http://localhost:8000"></iframe>

    <script src="popup.js"></script>
</body>

</html>
