<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interview Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --muted: #64748b;
            --accent: #6366f1;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            font-size: 15px;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        header {
            background: #fff;
            padding: 0 20px;
            height: 52px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left h1 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .q-count {
            font-size: 12px;
            color: var(--muted);
            font-weight: 500;
            padding: 4px 10px;
            background: #f1f5f9;
            border-radius: 12px;
        }

        /* Settings dropdown */
        .settings-wrapper {
            position: relative;
        }

        .settings-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
        }

        .settings-btn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        .settings-btn .gear {
            font-size: 15px;
        }

        .dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            min-width: 260px;
            z-index: 200;
            overflow: hidden;
        }

        .dropdown.open {
            display: block;
        }

        .dropdown-section {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
        }

        .dropdown-section:last-child {
            border-bottom: none;
        }

        .dropdown-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
            color: var(--text);
            cursor: pointer;
        }

        .dropdown-item:hover {
            color: var(--accent);
        }

        .dropdown-item .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 600;
        }

        .badge-ok {
            background: #dcfce7;
            color: #166534;
        }

        .badge-no {
            background: #fef2f2;
            color: #991b1b;
        }

        .dropdown-item button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 5px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
        }

        .dropdown-item button:hover {
            opacity: 0.85;
        }

        /* Switch */
        .switch-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
        }

        .switch-row label {
            font-size: 13px;
            color: var(--text);
        }

        .toggle {
            position: relative;
            width: 36px;
            height: 20px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #cbd5e1;
            border-radius: 20px;
            transition: 0.3s;
        }

        .toggle-slider:before {
            content: "";
            position: absolute;
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background: #fff;
            border-radius: 50%;
            transition: 0.3s;
        }

        .toggle input:checked+.toggle-slider {
            background: var(--accent);
        }

        .toggle input:checked+.toggle-slider:before {
            transform: translateX(16px);
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 80px;
        }

        /* ===== CARD ===== */
        .card {
            background: #fff;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: box-shadow 0.2s;
            cursor: pointer;
        }

        .card:hover {
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .card.latest {
            border-color: var(--accent);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.12);
        }

        .card.pinned {
            border-color: var(--accent);
            border-width: 2px;
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.2);
        }

        .container.has-pinned .card:not(.pinned) {
            opacity: 0.4;
        }

        .thinking .answer-body {
            opacity: 0.5;
        }

        /* Q header bar */
        .q-bar {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background: #f8fafc;
            border-bottom: 1px solid #f1f5f9;
            gap: 10px;
        }

        .q-id {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 26px;
            padding: 0 8px;
            border-radius: 6px;
            background: var(--accent);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            flex-shrink: 0;
        }

        .card:nth-child(6n+2) .q-id {
            background: #10b981;
        }

        .card:nth-child(6n+3) .q-id {
            background: #f59e0b;
        }

        .card:nth-child(6n+4) .q-id {
            background: #ef4444;
        }

        .card:nth-child(6n+5) .q-id {
            background: #8b5cf6;
        }

        .card:nth-child(6n+6) .q-id {
            background: #06b6d4;
        }

        .q-title {
            flex: 1;
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
        }

        .card.latest .q-title {
            font-size: 16px;
        }

        .q-meta {
            font-size: 11px;
            color: #94a3b8;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .code-tag {
            font-size: 10px;
            font-weight: 600;
            background: #1e293b;
            color: #22d3ee;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            flex-shrink: 0;
        }

        /* Answer body */
        .answer-body {
            padding: 16px 20px;
            color: #1e293b;
            font-size: 14.5px;
            line-height: 1.75;
        }

        .answer-body p {
            margin-bottom: 8px;
        }

        .answer-body p:first-child {
            font-weight: 500;
            color: #0f172a;
        }

        .answer-body ul,
        .answer-body ol {
            margin: 8px 0 8px 8px;
            padding-left: 16px;
        }

        .answer-body ul {
            list-style: none;
            padding-left: 0;
        }

        .answer-body ul li {
            position: relative;
            padding-left: 18px;
            margin-bottom: 6px;
        }

        .answer-body ul li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 10px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }

        .answer-body ol li {
            margin-bottom: 6px;
            padding-left: 4px;
        }

        .answer-body strong {
            color: #0f172a;
            font-weight: 600;
        }

        .answer-body pre {
            background: #282c34 !important;
            border-radius: 8px;
            margin: 10px 0;
            position: relative;
            overflow: hidden;
            border: 1px solid #3e4451;
        }

        .answer-body .code-header {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            background: #21252b;
            padding: 4px 10px;
            border-bottom: 1px solid #3e4451;
        }

        .copy-btn {
            background: none;
            color: #94a3b8;
            border: none;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
        }

        .copy-btn.copied {
            color: #4ade80;
        }

        .answer-body code {
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 12.5px !important;
            background: #eef2ff;
            color: #4338ca;
            padding: 2px 6px !important;
            border-radius: 4px;
            font-weight: 500;
        }

        .answer-body pre code {
            font-size: 13px !important;
            line-height: 1.7 !important;
            padding: 14px 16px !important;
            display: block;
            white-space: pre-wrap !important;
            word-wrap: break-word !important;
            word-break: break-word !important;
            overflow-wrap: break-word !important;
            background: #282c34 !important;
            color: #abb2bf !important;
        }

        /* High-contrast syntax highlighting overrides */
        .answer-body pre code .hljs-keyword,
        .answer-body pre code .hljs-built_in {
            color: #c678dd !important;
            font-weight: 600;
        }

        .answer-body pre code .hljs-function .hljs-title,
        .answer-body pre code .hljs-title.function_ {
            color: #61afef !important;
            font-weight: 600;
        }

        .answer-body pre code .hljs-string {
            color: #98c379 !important;
        }

        .answer-body pre code .hljs-number {
            color: #d19a66 !important;
        }

        .answer-body pre code .hljs-comment {
            color: #7f848e !important;
            font-style: italic;
        }

        .answer-body pre code .hljs-params {
            color: #e5c07b !important;
        }

        .answer-body pre code .hljs-variable,
        .answer-body pre code .hljs-attr {
            color: #e06c75 !important;
        }

        .answer-body pre code .hljs-literal {
            color: #56b6c2 !important;
        }

        .answer-body pre code .hljs-operator {
            color: #56b6c2 !important;
        }

        .answer-body pre code .hljs-punctuation {
            color: #abb2bf !important;
        }

        .answer-body pre code .hljs-meta {
            color: #61afef !important;
        }

        /* Metrics */
        .metrics-bar {
            display: flex;
            justify-content: flex-end;
            padding: 6px 16px;
            background: #fafbfc;
            border-top: 1px solid #f1f5f9;
            gap: 12px;
        }

        .micro-metric {
            font-size: 10px;
            color: #94a3b8;
            font-weight: 500;
        }

        .micro-metric span {
            color: var(--text);
            font-weight: 700;
            margin-left: 2px;
        }

        /* New answer bar */
        .new-answer-bar {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
            display: none;
        }

        .new-answer-bar:hover {
            background: #4f46e5;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
            text-align: center;
        }

        .empty-state h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: var(--muted);
            font-size: 14px;
            max-width: 300px;
        }

        /* Focus mode */
        .container.focus-mode .card:not(.latest) {
            display: none;
        }

        .container.focus-mode .card.latest {
            border-radius: 0;
            border: none;
            border-left: 4px solid var(--accent);
            box-shadow: none;
            min-height: calc(100vh - 60px);
        }

        .container.focus-mode .card.latest .q-title {
            font-size: 20px;
        }

        .container.focus-mode .card.latest .answer-body {
            font-size: 17px;
        }

        .container.focus-mode {
            padding: 0;
            max-width: 100%;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
        }

        .modal-content {
            background: #fff;
            margin: 8% auto;
            padding: 24px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 560px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 700;
        }

        .modal-close {
            font-size: 24px;
            cursor: pointer;
            color: var(--muted);
            background: none;
            border: none;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--text);
        }

        textarea#jdText {
            width: 100%;
            height: 280px;
            background: #f8fafc;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 8px;
            resize: vertical;
            margin-bottom: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.5;
        }

        textarea#jdText:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-save {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-save:hover {
            opacity: 0.9;
        }

        /* Mobile */
        @media (max-width: 600px) {
            header {
                padding: 0 12px;
            }

            .header-left h1 {
                font-size: 14px;
            }

            .container {
                padding: 10px;
            }

            .q-title {
                font-size: 13px;
            }

            .answer-body {
                padding: 10px 12px;
                font-size: 14px;
            }

            .answer-body pre code {
                font-size: 12px !important;
            }

            .dropdown {
                min-width: 220px;
                right: -8px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-left">
            <div class="status-dot"></div>
            <h1>Interview Assistant</h1>
            <span class="q-count" id="qCount">0 questions</span>
        </div>
        <div class="header-right">
            <div class="settings-wrapper">
                <button class="settings-btn" onclick="toggleDropdown(event)">
                    <span class="gear">&#9881;</span> Settings
                </button>
                <div class="dropdown" id="settingsDropdown">
                    <div class="dropdown-section">
                        <div class="dropdown-label">Resume</div>
                        <div class="dropdown-item">
                            <span id="resumeLabel">No resume loaded</span>
                            <button onclick="document.getElementById('resumeUpload').click()">Upload</button>
                        </div>
                        <input type="file" id="resumeUpload" accept=".txt,.pdf,.doc,.docx" style="display:none"
                            onchange="uploadResume(this)">
                    </div>
                    <div class="dropdown-section">
                        <div class="dropdown-label">Job Description</div>
                        <div class="dropdown-item" onclick="openJDModal()">
                            <span>Edit Job Description</span>
                            <span id="jdBadge" class="badge badge-no">Not set</span>
                        </div>
                    </div>
                    <div class="dropdown-section">
                        <div class="dropdown-label">STT Model</div>
                        <div class="dropdown-item">
                            <select id="sttModelSelect" onchange="changeSTTModel(this.value)" style="
                                background: #f8fafc; border: 1px solid var(--border); border-radius: 6px;
                                padding: 5px 10px; font-size: 13px; font-family: 'JetBrains Mono', monospace;
                                color: var(--text); cursor: pointer; width: 100%;
                            ">
                                <option value="tiny.en">tiny.en (fastest, least accurate)</option>
                                <option value="base.en">base.en (fast, basic accuracy)</option>
                                <option value="small.en" selected>small.en (balanced) - default</option>
                                <option value="medium.en">medium.en (slow, most accurate)</option>
                            </select>
                        </div>
                        <div id="modelStatus" style="font-size:11px; color:var(--muted); margin-top:4px;"></div>
                    </div>
                    <div class="dropdown-section">
                        <div class="dropdown-label">Display</div>
                        <div class="switch-row">
                            <label>Focus Mode</label>
                            <div class="toggle">
                                <input type="checkbox" id="focusMode" onchange="toggleFocus()">
                                <span class="toggle-slider"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- JD Modal -->
    <div id="jdModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Job Description</h3>
                <button class="modal-close" onclick="closeJDModal()">&times;</button>
            </div>
            <textarea id="jdText" placeholder="Paste the job description here..."></textarea>
            <div style="text-align:right;">
                <button class="btn-save" onclick="saveJD()">Save</button>
            </div>
        </div>
    </div>

    <div class="new-answer-bar" id="newAnswerBar" onclick="goToLatest()">New answer arrived</div>

    <div class="container" id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script>
        const app = document.getElementById('app');
        const newAnswerBar = document.getElementById('newAnswerBar');

        let allAnswers = [];
        let lastUpdateStr = '';
        let isFocusMode = false;
        let codeMap = {};
        let pinnedCardSerial = null;
        let pendingNewAnswers = 0;
        let prevAnswerCount = 0;

        marked.setOptions({
            highlight: (code, lang) => {
                if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
                return hljs.highlight(code, { language: 'python' }).value;
            },
            breaks: true, gfm: true
        });

        // Dropdown toggle
        function toggleDropdown(e) {
            e.stopPropagation();
            document.getElementById('settingsDropdown').classList.toggle('open');
        }
        document.addEventListener('click', () => {
            document.getElementById('settingsDropdown').classList.remove('open');
        });

        function toggleFocus() {
            isFocusMode = document.getElementById('focusMode').checked;
            render();
        }

        function formatMs(ms) {
            if (!ms) return '-';
            return ms < 1000 ? `${ms}ms` : `${(ms / 1000).toFixed(1)}s`;
        }

        function formatTime(isoStr) {
            if (!isoStr) return '';
            try {
                const d = new Date(isoStr);
                return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}:${d.getSeconds().toString().padStart(2, '0')}`;
            } catch { return ''; }
        }

        function addCopyButtons() {
            document.querySelectorAll('.answer-body pre').forEach(pre => {
                if (pre.querySelector('.code-header')) return;
                const header = document.createElement('div');
                header.className = 'code-header';
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerHTML = '&#9776; Copy';
                btn.onclick = (e) => {
                    e.stopPropagation();
                    navigator.clipboard.writeText(pre.querySelector('code')?.innerText || pre.innerText);
                    btn.innerHTML = '&#10003; Copied';
                    btn.classList.add('copied');
                    setTimeout(() => { btn.innerHTML = '&#9776; Copy'; btn.classList.remove('copied'); }, 1500);
                };
                header.appendChild(btn);
                pre.insertBefore(header, pre.firstChild);
            });
        }

        function togglePin(serial, e) {
            if (e.target.closest('.copy-btn')) return;
            pinnedCardSerial = pinnedCardSerial === serial ? null : serial;
            if (!pinnedCardSerial) { pendingNewAnswers = 0; newAnswerBar.style.display = 'none'; }
            render();
        }

        function goToLatest() {
            pinnedCardSerial = null;
            pendingNewAnswers = 0;
            newAnswerBar.style.display = 'none';
            render();
            setTimeout(() => {
                const f = app.querySelector('.card');
                if (f) f.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 50);
        }

        // Auto-detect code and wrap in markdown code fences for proper display
        function formatAnswer(answer) {
            if (!answer) return '';
            const trimmed = answer.trim();

            // If already has markdown code fences, leave as is
            if (trimmed.includes('```')) return answer;

            // Check if it's a bullet-point answer (interview mode)
            const isBulletAnswer = /^-\s/m.test(trimmed) && !(/^def\s|^class\s|^import\s/m.test(trimmed));
            if (isBulletAnswer) {
                // Format bullets as clean HTML list
                const bullets = trimmed.split('\n')
                    .filter(l => l.trim().startsWith('-'))
                    .map(l => l.trim().replace(/^-\s*/, '').trim())
                    .filter(l => l.length > 0);
                if (bullets.length > 0) {
                    return '<ul class="answer-bullets">' +
                        bullets.map(b => '<li>' + b + '</li>').join('') +
                        '</ul>';
                }
                return answer;
            }

            // Detect raw code (def, class, import, YAML, etc.)
            const codePatterns = [
                /^def\s+\w+\s*\(/m,
                /^class\s+\w+/m,
                /^import\s+\w+/m,
                /^from\s+\w+\s+import/m,
                /^if\s+__name__/m,
                /^\s{4,}(if|for|while|def|return|class)/m,
                /^\w+\s*=\s*[\{\[]/m,
                /\breturn\s+[\w\[\{]/m,
                /\bfor\s+\w+\s+in\s+/m,
                /^- hosts:/m,  // Ansible YAML
                /^---/m,       // YAML
            ];

            let codeScore = 0;
            for (const p of codePatterns) {
                if (p.test(trimmed)) codeScore++;
            }

            const lines = trimmed.split('\n');
            const hasMultipleLines = lines.length > 2;
            const hasIndentedLines = lines.some(l => l.startsWith('    ') || l.startsWith('\t'));

            const looksLikeCode = codeScore >= 2 || (hasMultipleLines && hasIndentedLines) ||
                codePatterns[0].test(trimmed);

            if (looksLikeCode) {
                return '```python\n' + trimmed + '\n```';
            }

            return answer;
        }

        function render() {
            const total = allAnswers.length;
            document.getElementById('qCount').textContent = `${total} question${total !== 1 ? 's' : ''}`;

            if (!total) {
                app.innerHTML = `
                    <div class="empty-state">
                        <h2>Ready for Interview</h2>
                        <p>Listening for questions. Answers will appear here in real time.</p>
                    </div>`;
                app.className = 'container';
                prevAnswerCount = 0;
                return;
            }

            const visible = isFocusMode ? [allAnswers[0]] : allAnswers;
            const isNewAnswer = total > prevAnswerCount && prevAnswerCount > 0;
            prevAnswerCount = total;

            if (isNewAnswer && pinnedCardSerial !== null) {
                pendingNewAnswers++;
                newAnswerBar.textContent = pendingNewAnswers === 1
                    ? 'New answer arrived — click to view'
                    : `${pendingNewAnswers} new answers — click to view`;
                newAnswerBar.style.display = 'block';
            }

            const hasPinned = pinnedCardSerial !== null;

            const html = visible.map((item, idx) => {
                const sNo = total - allAnswers.indexOf(item);
                const isLatest = item === allAnswers[0];
                const isComplete = item.is_complete !== false;
                const isPinned = pinnedCardSerial === sNo;
                const time = formatTime(item.timestamp);
                const codeIdx = codeMap[item.question];
                const hasCode = codeIdx !== undefined;

                const metricsHtml = (isLatest && isComplete && item.metrics) ? `
                    <div class="metrics-bar">
                        <div class="micro-metric">STT <span>${formatMs(item.metrics.transcription_ms)}</span></div>
                        <div class="micro-metric">LLM <span>${formatMs(item.metrics.llm_ms)}</span></div>
                        <div class="micro-metric">Total <span>${formatMs(item.metrics.total_ms)}</span></div>
                    </div>` : '';

                return `
                <div class="card ${isLatest ? 'latest' : ''} ${isPinned ? 'pinned' : ''} ${!isComplete ? 'thinking' : ''}"
                     onclick="togglePin(${sNo}, event)">
                    <div class="q-bar">
                        <span class="q-id">Q${sNo}</span>
                        <span class="q-title">${item.question || ''}</span>
                        ${hasCode ? `<span class="code-tag">#${codeIdx} Code</span>` : ''}
                        <span class="q-meta">${time}</span>
                    </div>
                    <div class="answer-body">${marked.parse(formatAnswer(item.answer || ''))}</div>
                    ${metricsHtml}
                </div>`;
            }).join('');

            app.className = 'container' + (hasPinned ? ' has-pinned' : '') + (isFocusMode ? ' focus-mode' : '');
            app.innerHTML = html;
            addCopyButtons();
            hljs.highlightAll();

            if (!hasPinned && isNewAnswer) {
                const f = app.querySelector('.card');
                if (f) f.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // === DATA LOADING ===
        async function loadInitial() {
            try {
                const r = await fetch('/api/answers');
                allAnswers = await r.json();
                prevAnswerCount = allAnswers.length;
                render();
            } catch { }
        }

        function setupSSE() {
            const es = new EventSource('/api/stream');
            es.onmessage = (e) => {
                if (e.data === lastUpdateStr) return;
                lastUpdateStr = e.data;
                try {
                    const d = JSON.parse(e.data);
                    if (Array.isArray(d)) { allAnswers = d; render(); }
                } catch { }
            };
            es.onerror = () => { es.close(); setTimeout(setupSSE, 500); };
        }

        function fallbackPolling() {
            setInterval(async () => {
                try {
                    const r = await fetch('/api/answers');
                    const d = await r.json();
                    const s = JSON.stringify(d);
                    if (s !== lastUpdateStr) { lastUpdateStr = s; allAnswers = d; render(); }
                } catch { }
            }, 300);
        }

        // === RESUME ===
        async function uploadResume(input) {
            const file = input.files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append('resume', file);
            try {
                const r = await fetch('/api/upload_resume', { method: 'POST', body: fd });
                const d = await r.json();
                if (r.ok && d.success) {
                    document.getElementById('resumeLabel').textContent = file.name;
                    document.getElementById('resumeLabel').nextElementSibling?.remove();
                }
            } catch { }
            input.value = '';
            checkResumeStatus();
        }

        async function checkResumeStatus() {
            try {
                const r = await fetch('/api/resume_status');
                const d = await r.json();
                const label = document.getElementById('resumeLabel');
                if (d.uploaded) {
                    label.innerHTML = 'Resume loaded <span class="badge badge-ok">OK</span>';
                } else {
                    label.innerHTML = 'No resume <span class="badge badge-no">Missing</span>';
                }
            } catch { }
        }

        // === JD ===
        async function openJDModal() {
            document.getElementById('settingsDropdown').classList.remove('open');
            document.getElementById('jdModal').style.display = 'block';
            try {
                const r = await fetch('/api/get_jd');
                const d = await r.json();
                document.getElementById('jdText').value = d.text || '';
            } catch { }
        }

        function closeJDModal() { document.getElementById('jdModal').style.display = 'none'; }

        async function saveJD() {
            const text = document.getElementById('jdText').value;
            const btn = document.querySelector('.btn-save');
            btn.textContent = 'Saving...';
            try {
                await fetch('/api/save_jd', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                btn.textContent = 'Saved!';
                document.getElementById('jdBadge').className = 'badge ' + (text.trim() ? 'badge-ok' : 'badge-no');
                document.getElementById('jdBadge').textContent = text.trim() ? 'Set' : 'Not set';
                setTimeout(() => { btn.textContent = 'Save'; closeJDModal(); }, 800);
            } catch { btn.textContent = 'Error'; setTimeout(() => btn.textContent = 'Save', 2000); }
        }

        async function checkJDStatus() {
            try {
                const r = await fetch('/api/get_jd');
                const d = await r.json();
                const b = document.getElementById('jdBadge');
                if (d.text && d.text.trim()) { b.className = 'badge badge-ok'; b.textContent = 'Set'; }
                else { b.className = 'badge badge-no'; b.textContent = 'Not set'; }
            } catch { }
        }

        window.onclick = (e) => { if (e.target === document.getElementById('jdModal')) closeJDModal(); };

        async function fetchCodeMap() {
            try {
                const r = await fetch('/api/code_payloads');
                const d = await r.json();
                const old = Object.keys(codeMap).length;
                codeMap = {};
                if (d.codes) d.codes.forEach(c => codeMap[c.question] = c.index);
                if (Object.keys(codeMap).length !== old && allAnswers.length) render();
            } catch { }
        }

        // === STT MODEL ===
        async function loadSTTModel() {
            try {
                const r = await fetch('/api/stt_model');
                const d = await r.json();
                if (d.model) {
                    document.getElementById('sttModelSelect').value = d.model;
                }
            } catch { }
        }

        async function changeSTTModel(model) {
            const status = document.getElementById('modelStatus');
            status.textContent = 'Loading model...';
            status.style.color = 'var(--accent)';
            try {
                const r = await fetch('/api/stt_model', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model })
                });
                const d = await r.json();
                if (d.error) {
                    status.textContent = 'Error: ' + d.error;
                    status.style.color = '#ef4444';
                } else if (d.changed) {
                    status.textContent = 'Model loaded: ' + d.model;
                    status.style.color = '#22c55e';
                } else {
                    status.textContent = 'Already using ' + d.model;
                    status.style.color = 'var(--muted)';
                }
                setTimeout(() => { status.textContent = ''; }, 3000);
            } catch {
                status.textContent = 'Failed to change model';
                status.style.color = '#ef4444';
            }
        }

        // Init
        loadInitial();
        checkResumeStatus();
        checkJDStatus();
        loadSTTModel();
        setupSSE();
        fallbackPolling();
        fetchCodeMap();
        setInterval(fetchCodeMap, 2000);
    </script>
</body>

</html>
